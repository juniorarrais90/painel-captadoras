<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel da Captadora — Arrais Advogados</title>
<style>
  :root{ --navy:#0D2340; --gold:#C9A84C; --bg:#f4f5f7; --card:#fff;
         --blue:#2563EB; --green:#1E9E5A; --red:#C0392B; --gray:#8A8F98; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--navy);
        line-height:1.45; padding-bottom:40px; }
  header{ background:var(--navy); color:#fff; padding:18px 16px; border-bottom:4px solid var(--gold); }
  header h1{ font-size:18px; font-weight:bold; }
  header p{ font-size:13px; opacity:.85; margin-top:2px; }
  .wrap{ max-width:560px; margin:0 auto; padding:16px; }
  .ola{ font-size:13px; color:#555; margin:2px 2px 12px; }

  .kpis{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px; }
  .kpi{ background:var(--card); border-radius:10px; padding:10px 6px; text-align:center; cursor:pointer;
        box-shadow:0 1px 3px rgba(13,35,64,.08); border:2px solid transparent; }
  .kpi .num{ font-size:22px; font-weight:bold; line-height:1; }
  .kpi .lbl{ font-size:10.5px; color:#666; margin-top:4px; text-transform:uppercase; letter-spacing:.2px; }
  .kpi.exigencia .num{ color:#9a7d2e; } .kpi.analise .num{ color:var(--blue); }
  .kpi.aprovado .num{ color:var(--green); } .kpi.recusado .num{ color:var(--red); }
  .kpi.ativo{ border-color:var(--navy); }

  .periodo{ background:var(--card); border-radius:10px; padding:10px 12px; margin-bottom:14px;
            box-shadow:0 1px 3px rgba(13,35,64,.08); font-size:13px; }
  .periodo .top{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .periodo input[type=date]{ border:1px solid #d4d7dd; border-radius:7px; padding:5px 7px; font-size:13px; font-family:inherit; }
  .periodo .atalhos{ margin-top:8px; display:flex; gap:6px; flex-wrap:wrap; }
  .periodo .atalhos button{ background:#eef0f3; border:1px solid #d4d7dd; border-radius:16px;
            padding:5px 12px; font-size:12px; cursor:pointer; color:var(--navy); }
  .periodo .atalhos button.on{ background:var(--navy); color:#fff; border-color:var(--navy); }
  .filtroaviso{ font-size:12px; color:#555; margin:-4px 2px 12px; text-align:center; }
  .filtroaviso a{ color:var(--blue); cursor:pointer; text-decoration:underline; }

  .card{ background:var(--card); border-radius:12px; padding:14px 16px; margin-bottom:14px;
         box-shadow:0 1px 4px rgba(13,35,64,.10); }
  .card h2{ font-size:16px; color:var(--navy); }
  .benef{ font-size:12px; color:#666; margin-top:1px; text-transform:uppercase; letter-spacing:.3px; }
  .linha{ font-size:14px; margin-top:9px; }
  .linha .rot, .obs .rot, .exig .rot{ font-size:11px; text-transform:uppercase; color:#8a8f98; letter-spacing:.4px; }
  .exig{ background:#FBF6E9; border-left:3px solid var(--gold); padding:9px 11px; border-radius:6px; margin-top:10px; }
  .exig .rot{ color:#9a7d2e; }
  .obs{ background:#f3f4f6; border-radius:6px; padding:9px 11px; margin-top:9px; font-size:13px; color:#444; }
  .respond{ margin-top:12px; }
  .respond label{ font-size:12px; color:#444; display:block; margin-bottom:4px; }
  textarea{ width:100%; min-height:70px; border:1px solid #d4d7dd; border-radius:8px;
            padding:9px; font-family:inherit; font-size:14px; resize:vertical; }
  .filebar{ display:flex; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .fakefile{ font-size:13px; background:#eef0f3; border:1px dashed #c4c8d0; border-radius:8px;
             padding:7px 12px; cursor:pointer; color:var(--navy); }
  .fname{ font-size:12px; color:#1E9E5A; }
  input[type=file]{ display:none; }
  button.enviar{ margin-top:10px; width:100%; background:var(--gold); color:var(--navy); border:none;
                 padding:12px; border-radius:9px; font-size:15px; font-weight:bold; cursor:pointer; }
  button.enviar:disabled{ background:#9aa1ad; color:#fff; cursor:default; }
  .suaresp{ margin-top:11px; background:#eef4ff; border-radius:8px; padding:10px 11px; font-size:13px; }
  .suaresp .rot{ font-size:11px; text-transform:uppercase; color:#2563EB; letter-spacing:.4px; display:block; margin-bottom:3px; }
  .suaresp a{ color:#2563EB; }
  .status{ margin-top:11px; border-radius:8px; padding:11px; font-size:14px; font-weight:bold; }
  .status.analise{ background:#E7F0FF; color:#1D4ED8; }
  .status.aprovado{ background:#E7F6EC; color:#1E7A43; }
  .status.recusado{ background:#FCEBEA; color:#A93226; }
  .data-tag{ font-size:11px; color:#9aa1ad; margin-top:8px; }
  .vazio{ text-align:center; color:#888; font-size:14px; padding:20px; }
  .estado{ text-align:center; padding:40px 16px; color:#666; font-size:15px; }
  .rodape{ text-align:center; font-size:11px; color:#9aa1ad; margin-top:18px; }
</style>
</head>
<body>
  <header>
    <h1>Painel de Acompanhamento</h1>
    <p>Arrais Advogados — acompanhe seus indicados</p>
  </header>

  <div class="wrap">
    <div id="conteudo"><div class="estado">Carregando…</div></div>
    <div class="rodape">Arrais Advogados &middot; uso exclusivo da captadora &middot; dados confidenciais</div>
  </div>

<script>
  /* ====== CONFIGURE AQUI (1 linha) ====== */
  var WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbykwv7LMuRwpTVYV7zC9m8sQGQDx-jVkBfKElXrSLgKOxiASOC4uF9qjXhP-ZcDWNI/exec';
  /* ====================================== */

  var TOKEN = new URLSearchParams(location.search).get('c') || '';
  var conteudo = document.getElementById('conteudo');
  var anexos = {};          // linha -> {nome,tipo,dados}
  var DADOS = null;
  var FILTRO = 'todos';     // categoria
  var DE = '', ATE = '';    // periodo yyyy-mm-dd
  var ATALHO = 'tudo';      // tudo | semana | mes | custom

  var LABEL = { exigencia:'Em exigência', analise:'Em análise', aprovado:'Aprovados', recusado:'Perdidos' };

  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function nl(s){ return esc(s).replace(/\n/g,'<br>'); }
  function categoria(it){
    if (it.devStatus === 'aprovado') return 'aprovado';
    if (it.devStatus === 'recusado') return 'recusado';
    if (it.respondido || it.devStatus === 'analise') return 'analise';
    return 'exigencia';
  }

  /* ---- datas ---- */
  function fmt(d){ var m=d.getMonth()+1, dia=d.getDate(); return d.getFullYear()+'-'+(m<10?'0':'')+m+'-'+(dia<10?'0':'')+dia; }
  function brData(iso){ if(!iso) return ''; var p=iso.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
  function rangeSemana(){ var d=new Date(); var dow=(d.getDay()+6)%7; var ini=new Date(d); ini.setDate(d.getDate()-dow); var fim=new Date(ini); fim.setDate(ini.getDate()+6); return [fmt(ini),fmt(fim)]; }
  function rangeMes(){ var d=new Date(); return [fmt(new Date(d.getFullYear(),d.getMonth(),1)), fmt(new Date(d.getFullYear(),d.getMonth()+1,0))]; }
  function dentroPeriodo(it){
    if(!DE && !ATE) return true;
    if(!it.dataRef) return false;
    if(DE && it.dataRef < DE) return false;
    if(ATE && it.dataRef > ATE) return false;
    return true;
  }

  function atalho(a){
    ATALHO = a;
    if(a==='tudo'){ DE=''; ATE=''; }
    else if(a==='semana'){ var r=rangeSemana(); DE=r[0]; ATE=r[1]; }
    else if(a==='mes'){ var m=rangeMes(); DE=m[0]; ATE=m[1]; }
    render();
  }
  function mudarData(){
    DE = document.getElementById('de').value;
    ATE = document.getElementById('ate').value;
    ATALHO = (!DE && !ATE) ? 'tudo' : 'custom';
    render();
  }
  function setFiltro(f){ FILTRO = (FILTRO===f?'todos':f); render(); }

  if (!TOKEN) {
    conteudo.innerHTML = '<div class="estado">Link inválido. Use o link exclusivo que o escritório enviou.</div>';
  } else { carregar(); }

  // Lê via JSONP (script tag) para contornar o CORS do Apps Script
  function carregar(){
    var cb = 'cbpainel_' + Date.now();
    var s = document.createElement('script');
    var t = setTimeout(falhou, 20000);
    function limpar(){ clearTimeout(t); try { delete window[cb]; } catch (e) { window[cb] = undefined; } if (s.parentNode) s.parentNode.removeChild(s); }
    function falhou(){ limpar(); conteudo.innerHTML = '<div class="estado">Não foi possível carregar agora. Atualize a página (puxe para baixo ou F5).</div>'; }
    window[cb] = function(d){ limpar(); DADOS = d; render(); };
    s.onerror = falhou;
    s.src = WEBAPP_URL + '?c=' + encodeURIComponent(TOKEN) + '&callback=' + cb + '&t=' + Date.now();
    document.body.appendChild(s);
  }

  function render(){
    var d = DADOS;
    if (!d || !d.ok) { conteudo.innerHTML = '<div class="estado">' + esc((d && d.erro) || 'Link inválido.') + '</div>'; return; }
    if (!d.itens.length) { conteudo.innerHTML = '<div class="estado">Nenhum cliente em acompanhamento no momento.</div>'; return; }

    var base = d.itens.filter(dentroPeriodo);            // recorte por periodo
    var c = { exigencia:0, analise:0, aprovado:0, recusado:0 };
    base.forEach(function(it){ c[categoria(it)]++; });

    var html = '<div class="ola">Olá, <b>' + esc(d.captadora) + '</b>! Veja abaixo o resumo dos seus indicados.</div>';

    // contadores
    html += '<div class="kpis">';
    ['exigencia','analise','aprovado','recusado'].forEach(function(k){
      html += '<div class="kpi ' + k + (FILTRO===k?' ativo':'') + '" onclick="setFiltro(\'' + k + '\')">' +
                '<div class="num">' + c[k] + '</div><div class="lbl">' + LABEL[k] + '</div></div>';
    });
    html += '</div>';

    // filtro de periodo
    html += '<div class="periodo"><div class="top">Período: ' +
              '<input type="date" id="de" value="' + DE + '" onchange="mudarData()"> a ' +
              '<input type="date" id="ate" value="' + ATE + '" onchange="mudarData()"></div>' +
            '<div class="atalhos">' +
              '<button class="' + (ATALHO==='semana'?'on':'') + '" onclick="atalho(\'semana\')">Esta semana</button>' +
              '<button class="' + (ATALHO==='mes'?'on':'') + '" onclick="atalho(\'mes\')">Este mês</button>' +
              '<button class="' + (ATALHO==='tudo'?'on':'') + '" onclick="atalho(\'tudo\')">Tudo</button>' +
            '</div></div>';

    if (FILTRO !== 'todos')
      html += '<div class="filtroaviso">Mostrando: <b>' + LABEL[FILTRO] + '</b> &nbsp;·&nbsp; <a onclick="setFiltro(\'todos\')">ver todos os status</a></div>';

    var lista = base.filter(function(it){ return FILTRO==='todos' || categoria(it)===FILTRO; });
    if (!lista.length) html += '<div class="vazio">Nenhum cliente neste filtro/período.</div>';

    lista.forEach(function(it){
      html += '<div class="card" id="card-' + it.linha + '">' +
                '<h2>' + esc(it.nome) + '</h2>' +
                '<div class="benef">' + esc(it.beneficio || '—') + '</div>' +
                '<div class="linha"><span class="rot">Situação</span><br>' + esc(it.situacao || '—') + '</div>';
      if (it.exigencia)   html += '<div class="exig"><span class="rot">Exigência</span><br>' + nl(it.exigencia) + '</div>';
      if (it.observacoes) html += '<div class="obs"><span class="rot">Observações</span><br>' + nl(it.observacoes) + '</div>';
      if (it.respondido)  html += '<div class="suaresp"><span class="rot">Sua resposta enviada</span>' + nl(it.resposta) +
                                  (it.anexo ? '<br><a href="' + esc(it.anexo) + '" target="_blank">📎 ver anexo</a>' : '') + '</div>';
      if (it.devStatus)   html += '<div class="status ' + esc(it.devStatus) + '">' + nl(it.devTexto) + '</div>';
      if (it.dataRef && (it.devStatus==='aprovado' || it.devStatus==='recusado'))
        html += '<div class="data-tag">Definido em ' + brData(it.dataRef) + '</div>';

      var fechado = it.respondido || it.devStatus === 'aprovado' || it.devStatus === 'recusado';
      if (!fechado) {
        html += '<div class="respond">' +
                  '<label>Cumprir exigência — escreva e/ou anexe o que foi pedido:</label>' +
                  '<textarea id="txt-' + it.linha + '" placeholder="Ex.: já falei com o cliente, segue o documento solicitado..."></textarea>' +
                  '<div class="filebar">' +
                    '<label class="fakefile" for="file-' + it.linha + '">📎 Anexar arquivo</label>' +
                    '<input type="file" id="file-' + it.linha + '" onchange="pegarArquivo(' + it.linha + ',this)">' +
                    '<span class="fname" id="fname-' + it.linha + '"></span>' +
                  '</div>' +
                  '<button class="enviar" id="btn-' + it.linha + '" onclick="enviar(' + it.linha + ')">Cumprir exigência</button>' +
                  '<div id="ok-' + it.linha + '"></div>' +
                '</div>';
      }
      html += '</div>';
    });

    conteudo.innerHTML = html;
  }

  function pegarArquivo(linha, input){
    var f = input.files[0];
    if (!f) return;
    if (f.size > 8 * 1024 * 1024) { alert('Arquivo muito grande (máx. 8 MB).'); input.value = ''; return; }
    var reader = new FileReader();
    reader.onload = function(){
      anexos[linha] = { nome: f.name, tipo: f.type, dados: reader.result.split(',')[1] };
      document.getElementById('fname-' + linha).textContent = '✓ ' + f.name;
    };
    reader.readAsDataURL(f);
  }

  function enviar(linha){
    var txt = document.getElementById('txt-' + linha).value.trim();
    if (!txt && !anexos[linha]) { alert('Escreva um recado ou anexe um arquivo antes de enviar.'); return; }
    if (!txt) txt = '(enviou apenas anexo)';
    var btn = document.getElementById('btn-' + linha);
    btn.disabled = true; btn.textContent = 'Enviando…';

    var payload = { c: TOKEN, linha: linha, recado: txt };
    if (anexos[linha]) payload.arquivo = anexos[linha];

    // POST em modo no-cors (o Apps Script grava; a resposta é opaca, então
    // tratamos o envio como concluído de forma otimista).
    fetch(WEBAPP_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    })
    .then(function(){
      var it = DADOS.itens.filter(function(x){ return x.linha === linha; })[0];
      if (it) {
        it.resposta = txt; it.respondido = true; it.devStatus = 'analise';
        it.devTexto = 'Sua resposta está em análise pelo escritório.';
        if (!it.dataRef) it.dataRef = fmt(new Date());
      }
      render();
    })
    .catch(function(){
      btn.disabled = false; btn.textContent = 'Cumprir exigência';
      alert('Falha de conexão. Tente novamente.');
    });
  }
</script>
</body>
</html>
